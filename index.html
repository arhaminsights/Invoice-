<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arham Insights - Invoice Maker</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #121212; color: white; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: white; }
        button { width: 95%; padding: 12px; background: #22c55e; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        canvas { border: 1px solid #fff; margin-top: 20px; max-width: 100%; border-radius: 5px; background: white; }
        h2 { color: #22c55e; }
    </style>
</head>
<body>

<div class="container">
    <h2>Invoice Generator</h2>
    <input type="text" id="name" placeholder="Customer Name" oninput="drawInvoice()">
    <input type="text" id="phone" placeholder="Phone Number" oninput="drawInvoice()">
    <input type="text" id="address" placeholder="Address" oninput="drawInvoice()">
    <input type="text" id="date" value="18-03-2026" oninput="drawInvoice()">
    
    <canvas id="invoiceCanvas" width="800" height="1100"></canvas>
    
    <button onclick="downloadInvoice()">Download PDF Bill</button>
</div>

<script>
    const canvas = document.getElementById('invoiceCanvas');
    const ctx = canvas.getContext('2d');

    // Default Values
    function drawInvoice() {
        const name = document.getElementById('name').value || "Sourabh";
        const phone = document.getElementById('phone').value || "7363736372";
        const address = document.getElementById('address').value || "Ragho Majra, Patiala";
        const date = document.getElementById('date').value || "18-03-2026";

        // 1. Clear Canvas & White Background
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Header - ARHAM INSIGHTS
        ctx.fillStyle = "black";
        ctx.font = "bold 45px Arial";
        ctx.textAlign = "center";
        ctx.fillText("ARHAM INSIGHTS", 400, 100);
        
        ctx.font = "20px Arial";
        ctx.fillText("Official Payment Receipt", 400, 140);

        // 3. Horizontal Lines
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(50, 170); ctx.lineTo(750, 170); ctx.stroke();

        // 4. Details Section
        ctx.textAlign = "left";
        ctx.font = "bold 24px Arial";
        ctx.fillText("Name:", 70, 230);
        ctx.fillText("Phone:", 70, 270);
        ctx.fillText("Address:", 70, 310);
        ctx.fillText("Date:", 70, 350);

        ctx.font = "24px Arial";
        ctx.fillText(name, 220, 230);
        ctx.fillText(phone, 220, 270);
        ctx.fillText(address, 220, 310);
        ctx.fillText(date, 220, 350);

        // 5. Table Header
        ctx.beginPath();
        ctx.moveTo(50, 400); ctx.lineTo(750, 400); ctx.stroke();
        ctx.font = "bold 22px Arial";
        ctx.fillText("PARTICULARS", 70, 435);
        ctx.textAlign = "right";
        ctx.fillText("AMOUNT", 730, 435);
        ctx.beginPath();
        ctx.moveTo(50, 460); ctx.lineTo(750, 460); ctx.stroke();

        // 6. Fees
        ctx.textAlign = "left";
        ctx.font = "22px Arial";
        ctx.fillText("Network Access Fee", 70, 510);
        ctx.fillText("Registration Fee", 70, 560);
        ctx.textAlign = "right";
        ctx.fillText("₹ 500.00", 730, 510);
        ctx.fillText("₹ 1500.00", 730, 560);

        // 7. Grand Total
        ctx.beginPath();
        ctx.moveTo(50, 610); ctx.lineTo(750, 610); ctx.stroke();
        ctx.font = "bold 28px Arial";
        ctx.textAlign = "left";
        ctx.fillText("GRAND TOTAL", 70, 655);
        ctx.textAlign = "right";
        ctx.fillText("₹ 2000.00", 730, 655);
        ctx.beginPath();
        ctx.moveTo(50, 680); ctx.lineTo(750, 680); ctx.stroke();

        // 8. Paid Stamp (Light Green)
        ctx.save();
        ctx.translate(400, 530);
        ctx.rotate(-0.2);
        ctx.strokeStyle = "rgba(34, 197, 94, 0.3)";
        ctx.lineWidth = 5;
        ctx.strokeRect(-80, -40, 160, 80);
        ctx.fillStyle = "rgba(34, 197, 94, 0.3)";
        ctx.font = "bold 40px Arial";
        ctx.textAlign = "center";
        ctx.fillText("PAID", 0, 15);
        ctx.restore();

        // 9. Footer Text
        ctx.fillStyle = "gray";
        ctx.font = "italic 18px Arial";
        ctx.textAlign = "left";
        ctx.fillText("* This is a computer generated invoice.", 70, 850);

        // 10. Signature (Image Link from yours)
        const signImg = new Image();
        signImg.crossOrigin = "anonymous";
        signImg.src = "https://i.ibb.co/HD3kK5Nm/IMG-20260318-100955.png";
        signImg.onload = function() {
            ctx.drawImage(signImg, 500, 800, 200, 100);
            ctx.fillStyle = "black";
            ctx.font = "bold 18px Arial";
            ctx.textAlign = "center";
            ctx.fillText("Authorized Signatory", 600, 920);
        };
    }

    // Initial Draw
    window.onload = drawInvoice;

    function downloadInvoice() {
        const link = document.createElement('a');
        link.download = 'Arham_Insights_Bill.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>

</body>
</html>
